version: "3.9"

# Development overrides — hot-reload for all services.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    volumes:
      - ./apps/api:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug

  governance:
    volumes:
      - ./apps/worker/governance:/src
    environment:
      GOVERNANCE_PROXY_ADDR: ":8090"
