# Alembic Configuration — Enterprise Agent OS

[alembic]
# Path to migration versions directory
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long revision identifiers in filenames
truncate_slug_length = 40

# sys.path prepend (project root so "app" package is importable)
prepend_sys_path = .

# Timezone for file_template date fields
# timezone =

# Max length of characters to apply to "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .hierarchyreview during 'revision' command
# sourceless = false

# Version number format
# output_encoding = utf-8

# Database URL — overridden at runtime by env.py from app.core.config
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Hooks run after a new revision file is generated.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
