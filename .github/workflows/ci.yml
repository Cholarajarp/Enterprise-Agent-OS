name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ── Python API Tests ─────────────────────────────────────
  api-test:
    name: API Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agent_os_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e . 2>/dev/null || pip install fastapi uvicorn pydantic
          pip install pytest pytest-asyncio anyio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/agent_os_test
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
          JWT_PUBLIC_KEY: test-key
          ANTHROPIC_API_KEY: test
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_health.py

      - name: Run workflow unit tests
        run: python -m pytest tests/test_workflows.py tests/test_orchestrator.py tests/test_llm_router.py -v --tb=short

  # ── Go Governance Proxy ──────────────────────────────────
  governance-test:
    name: Governance Proxy (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker/governance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/worker/governance/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -race -count=1 -timeout 60s

      - name: Build binary
        run: go build -o /dev/null ./cmd

  # ── Frontend ─────────────────────────────────────────────
  web-check:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter web exec tsc --noEmit
        continue-on-error: true

      - name: Run vitest
        run: pnpm --filter web exec vitest run --reporter=verbose
        continue-on-error: true

      - name: Build
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_TELEMETRY_DISABLED: "1"

  # ── Docker Build Check ───────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: api, context: apps/api }
          - { name: governance, context: apps/worker/governance }

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: enterprise-os-${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── SQL Schema Check ─────────────────────────────────────
  schema-check:
    name: Schema Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: schema_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Apply init schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d schema_test \
            -f packages/db/init.sql
