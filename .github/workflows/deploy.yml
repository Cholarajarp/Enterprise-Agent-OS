name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/enterprise-os

jobs:
  # ── Build & Push Container Images ───────────────────────
  build-images:
    name: Build & Push (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: api, context: apps/api }
          - { name: governance, context: apps/worker/governance }

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ───────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    needs: build-images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "api_image=${{ env.IMAGE_PREFIX }}-api:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "governance_image=${{ env.IMAGE_PREFIX }}-governance:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Deploy summary
        run: |
          cat <<EOF
          ╔══════════════════════════════════════════════╗
          ║          Enterprise Agent OS Deploy          ║
          ╠══════════════════════════════════════════════╣
          ║ Environment : ${{ github.event.inputs.environment || 'staging' }}
          ║ API         : ${{ steps.tags.outputs.api_image }}
          ║ Governance  : ${{ steps.tags.outputs.governance_image }}
          ║ Commit      : ${{ github.sha }}
          ╚══════════════════════════════════════════════╝
          EOF

      - name: Apply Kubernetes manifests
        if: ${{ secrets.KUBECONFIG != '' }}
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
          API_IMAGE: ${{ steps.tags.outputs.api_image }}
          GOVERNANCE_IMAGE: ${{ steps.tags.outputs.governance_image }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          # Update images
          kubectl set image deployment/api api=$API_IMAGE -n agent-os || true
          kubectl set image deployment/governance governance=$GOVERNANCE_IMAGE -n agent-os || true
          # Wait for rollout
          kubectl rollout status deployment/api -n agent-os --timeout=120s || true
          kubectl rollout status deployment/governance -n agent-os --timeout=120s || true
